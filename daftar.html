<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pendaftaran BAP | SIBAP Polonia</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

header{
  background:#0c3b5f;
  color:#fff;
  padding:35px;
  text-align:center;
}

.container{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:40px;
  border-radius:12px;
}

.info{
  background:#f0f6fa;
  border-left:6px solid #0c3b5f;
  padding:20px;
  margin-bottom:30px;
  line-height:1.6;
}

label{
  display:block;
  margin-top:18px;
  font-weight:bold;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
}

button{
  margin-top:30px;
  width:100%;
  padding:14px;
  background:#0c3b5f;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.note{
  margin-top:10px;
  font-size:13px;
  color:#555;
}

.drive-link{
  margin-top:10px;
  display:none;
}

.drive-link a{
  display:block;
  background:#28a745;
  color:#fff;
  text-align:center;
  padding:10px;
  border-radius:6px;
  text-decoration:none;
  margin-top:8px;
}
</style>
</head>

<body>

<header>
  <h1>Pendaftaran BAP Paspor</h1>
  <p>Kantor Imigrasi Kelas I TPI Polonia</p>
</header>

<div class="container">

  <div class="info">
    <b>Pendaftaran ini merupakan pendaftaran awal.</b><br>
    Setelah diverifikasi petugas, pemohon wajib datang ke kantor imigrasi.
  </div>

  <form id="formDaftar">

    <label>Tanggal BAP</label>
    <input type="text" id="tanggalBAP" readonly>

    <label>Nama Lengkap</label>
    <input type="text" required>

    <label>NIK</label>
    <input type="text" maxlength="16" required>

    <label>Nomor HP Aktif</label>
    <input type="text" required>

    <label>Jenis Permohonan</label>
    <select id="jenisPermohonan" required>
      <option value="">-- Pilih Jenis Permohonan --</option>
      <option value="hilang">Paspor Hilang</option>
      <option value="rusak">Paspor Rusak</option>
      <option value="perubahan">Perubahan Data</option>
    </select>

    <label>Berkas Pendukung</label>
    <input type="text" id="berkas" readonly>

    <div class="drive-link" id="driveLink">
      <a id="linkDrive" href="#" target="_blank">Upload Berkas</a>
    </div>

    <button type="submit">Kirim Pendaftaran</button>
    <div class="note">*Tanggal mengikuti jadwal yang dipilih dan tidak dapat diubah</div>

  </form>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const tanggal = params.get("tanggal");

if(!tanggal){
  alert("Tanggal tidak valid");
  window.location.href = "jadwal.html";
}

document.getElementById("tanggalBAP").value = tanggal;

/* 🔥 HANYA CEK STATUS, TIDAK UBAH */
let status = JSON.parse(localStorage.getItem("jadwalStatus")) || {};

if(status[tanggal] === "full"){
  alert("Kuota tanggal ini sudah penuh");
  window.location.href = "jadwal.html";
}

const jenis = document.getElementById("jenisPermohonan");
const berkas = document.getElementById("berkas");
const driveLink = document.getElementById("driveLink");
const linkDrive = document.getElementById("linkDrive");

jenis.addEventListener("change", ()=>{
  driveLink.style.display="none";

  if(jenis.value === "hilang"){
    berkas.value = "Ijazah / Buku Nikah";
    driveLink.style.display="block";
    linkDrive.href = "https://docs.google.com/forms/d/e/1FAIpQLSd4gYGJRgE5vdWmN39rkRKxjNE_5Js7Xi2bfo5XNOPg2pgY6w/viewform";
    linkDrive.innerText = "Upload Berkas Paspor Hilang";
  } 
  else if(jenis.value === "rusak"){
    berkas.value = "Ijazah / Buku Nikah";
    driveLink.style.display="block";
    linkDrive.href = "https://docs.google.com/forms/d/e/1FAIpQLSewTDJgOyGhX2_LU6RjmfHwJ-G4JRFktx4D5WbV_KN8wChhEw/viewform";
    linkDrive.innerText = "Upload Berkas Paspor Rusak";
  } 
  else if(jenis.value === "perubahan"){
    berkas.value = "Surat Putusan Pengadilan, Ijazah, Buku Nikah";
    driveLink.style.display="block";
    linkDrive.href = "https://docs.google.com/forms/d/e/1FAIpQLSfl73xC6mB15Sc1nLyDmESUa2_sS7dNyb8IRPSIr3wQz7ARZA/viewform";
    linkDrive.innerText = "Upload Berkas Perubahan Data";
  } 
  else {
    berkas.value = "";
  }
});

/* 🔥 SUBMIT HANYA NOTIF */
document.getElementById("formDaftar").addEventListener("submit", function(e){
  e.preventDefault();

  alert("Pendaftaran berhasil, silakan upload berkas sesuai jenis permohonan");
  window.location.href = "jadwal.html";
});
</script>

</body>
</html>
